<div class="application-card">

  <h3 class="title">Application Status</h3>

  <div class="timeline">

    <!-- STEP 1 -->
    <div class="timeline-item active">
      <div class="timeline-left">
        <div class="circle">1</div>
        <div class="line"></div>
      </div>

      <div class="timeline-content">
        <div class="step-header">
          <h4>Under review</h4>
        </div>

        <p>
          Our team is reviewing your documents. Once your loan is
          conditionally approved, our team will contact you for next steps.
        </p>

        <button class="task-btn">
          Complete my task
          <span>→</span>
        </button>
      </div>
    </div>

    <!-- STEP 2 -->
    <div class="timeline-item">
      <div class="timeline-left">
        <div class="circle inactive">2</div>
        <div class="line"></div>
      </div>

      <div class="timeline-content collapsed">
        <div class="step-row">
          <span>Initial approval</span>
          <span class="icon">⌄</span>
        </div>
      </div>
    </div>

    <!-- STEP 3 -->
    <div class="timeline-item">
      <div class="timeline-left">
        <div class="circle inactive">3</div>
        <div class="line"></div>
      </div>

      <div class="timeline-content collapsed">
        <div class="step-row">
          <span>Final approval</span>
          <span class="icon">⌄</span>
        </div>
      </div>
    </div>

    <!-- STEP 4 -->
    <div class="timeline-item last">
      <div class="timeline-left">
        <div class="circle inactive">4</div>
      </div>

      <div class="timeline-content collapsed">
        <div class="step-row">
          <span>Paid</span>
          <span class="icon">⌄</span>
        </div>
      </div>
    </div>

  </div>

</div>
